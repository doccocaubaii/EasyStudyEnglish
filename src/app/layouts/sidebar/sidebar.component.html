<nav class="sidebar">
  <div class="logo">
    <h2>Easy study</h2>
  </div>

  <ul class="menu">
    @for (item of menuItems; track item) {
      <li>
        <a [routerLink]="item.link" routerLinkActive="active">
          <i [class]="item.icon"></i>
          {{ item.title }}
        </a>
      </li>
    }
  </ul>
</nav>
